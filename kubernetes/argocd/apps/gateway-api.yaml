apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gateway-api
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: infra-project
  sources:
    - repoURL: https://github.com/kubernetes-sigs/gateway-api.git
      targetRevision: v1.3.0
      path: config/crd/standard
  destination:
    name: in-cluster
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
