apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cilium
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: infra-project
  sources:
    - repoURL: https://helm.cilium.io/
      chart: cilium
      targetRevision: "1.18.1"
      helm:
        releaseName: cilium
        valueFiles:
          - $repo/kubernetes/cilium/values.yaml
    - repoURL: https://github.com/kubernetes-sigs/gateway-api.git
      targetRevision: v1.3.0
      path: config/crd/standard
    - repoURL: https://github.com/KanarekLife/HomeLab.git
      targetRevision: HEAD
      ref: repo
    - repoURL: https://github.com/KanarekLife/HomeLab.git
      targetRevision: HEAD
      path: kubernetes/cilium/manifests
  destination:
    name: in-cluster
    namespace: cilium
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    managedNamespaceMetadata:
      labels:
        pod-security.kubernetes.io/enforce: privileged
    syncOptions:
      - CreateNamespace=true
